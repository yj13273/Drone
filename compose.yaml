services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: uav-route-backend:latest
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/drone_route_optimization
      RUNS_DIR: /app/runs
      CORS_ORIGIN: http://localhost:5173
      TRUST_PROXY: "false"
      NODE_ENV: development
    depends_on:
      - mongo
    volumes:
      - ./runs:/app/runs
    ports:
      - "5000:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000
    image: uav-route-frontend:latest
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped

  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.11-slim
        CMAKE_BUILD_TYPE: Release
        CPP_EXECUTABLE_NAME: uav_pipeline
    image: uav-route-optimization:latest
    working_dir: /app
    environment:
      MONGO_URI: mongodb://mongo:27017/drone_route_optimization
      RUNS_DIR: /app/runs
    depends_on:
      - mongo
    volumes:
      - ./runs:/app/runs
      - ./data/csv:/app/data/csv
      - ./data/outputs:/app/data/outputs
      - ./data/plots:/app/data/plots
    command: python pipeline/scripts/worker.py
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.11-slim
        CMAKE_BUILD_TYPE: Release
        CPP_EXECUTABLE_NAME: uav_pipeline
    image: uav-route-optimization:latest
    working_dir: /app
    profiles:
      - manual
    volumes:
      - ./data/csv:/app/data/csv
      - ./data/outputs:/app/data/outputs
      - ./data/plots:/app/data/plots
      - ./runs:/app/runs
    command: sh pipeline/scripts/run_all.sh

  python-gen:
    image: uav-route-optimization:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.11-slim
        CMAKE_BUILD_TYPE: Release
        CPP_EXECUTABLE_NAME: uav_pipeline
    working_dir: /app
    profiles:
      - manual
    volumes:
      - ./data/csv:/app/data/csv
      - ./data/outputs:/app/data/outputs
      - ./data/plots:/app/data/plots
      - ./runs:/app/runs
    command: sh -c "python pipeline/env_generator/main.py"

  cpp-only:
    image: uav-route-optimization:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: 3.11-slim
        CMAKE_BUILD_TYPE: Release
        CPP_EXECUTABLE_NAME: uav_pipeline
    working_dir: /app
    profiles:
      - manual
    volumes:
      - ./data/csv:/app/data/csv
      - ./data/outputs:/app/data/outputs
      - ./data/plots:/app/data/plots
      - ./runs:/app/runs
    command: sh -c "uav_pipeline && python pipeline/env_generator/visualization/finalcsv.py"

volumes:
  mongo_data:
